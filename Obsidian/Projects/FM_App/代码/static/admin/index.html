<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Radio - 管理员登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .bg-aurora {
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(14, 165, 233, 0.2) 0%, transparent 50%),
                linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 50%, #f8fafc 100%);
            min-height: 100vh;
        }
        
        .liquid-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }
        
        .input-field {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.08);
            transition: all 0.2s ease;
        }
        
        .input-field:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #0ea5e9;
            outline: none;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }
        
        .login-btn {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            transition: all 0.2s ease;
        }
        
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 30px -10px rgba(2, 132, 199, 0.4);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-aurora flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="liquid-glass rounded-[2rem] p-10">
            <!-- Logo -->
            <div class="text-center mb-10">
                <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-sky-400 to-blue-500 flex items-center justify-center shadow-lg">
                    <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-semibold text-gray-900">管理员登录</h1>
                <p class="text-sm text-gray-500 mt-2">FM Radio 管理后台</p>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                    <input 
                        type="text" 
                        id="username" 
                        class="input-field w-full px-4 py-3 rounded-xl text-gray-900"
                        placeholder="请输入用户名"
                        value="admin"
                        required
                    >
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="input-field w-full px-4 py-3 rounded-xl text-gray-900"
                        placeholder="请输入密码"
                        value="admin"
                        required
                    >
                </div>
                
                <div id="errorMsg" class="hidden text-sm text-red-500 text-center"></div>
                
                <button type="submit" class="login-btn w-full py-3.5 rounded-xl text-white font-medium">
                    登录
                </button>
            </form>
            
            <!-- Back Link -->
            <div class="mt-8 text-center">
                <a href="/" class="text-sm text-gray-500 hover:text-gray-700 transition-colors">
                    ← 返回播放器
                </a>
            </div>
        </div>
        
        <!-- Footer -->
        <p class="text-center text-xs text-gray-400 mt-6">
            默认账号: admin / admin
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Store token
                    localStorage.setItem('adminToken', data.token);
                    // Redirect to dashboard
                    window.location.href = '/admin/dashboard.html';
                } else {
                    errorMsg.textContent = data.error || '登录失败，请检查用户名和密码';
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
