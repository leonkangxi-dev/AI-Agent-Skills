<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Radio - Web Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .liquid-glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        
        .liquid-glass-dark {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        
        .bg-aurora {
            background: radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.25) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(14, 165, 233, 0.2) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(96, 165, 250, 0.15) 0%, transparent 60%),
                        linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 30%, #eff6ff 70%, #f8fafc 100%);
            min-height: 100vh;
        }
        
        .play-btn {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 50%, #075985 100%);
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.3), inset 0 -2px 4px rgba(0, 0, 0, 0.2), 0 4px 12px rgba(2, 132, 199, 0.15);
            transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .play-btn:hover { transform: translateY(-1px); }
        .play-btn:active { transform: translateY(1px) scale(0.98); box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.25); }
        
        .control-btn { background: rgba(0, 0, 0, 0.05); transition: all 0.2s ease; }
        .control-btn:hover { background: rgba(0, 0, 0, 0.1); transform: scale(1.05); }
        
        .progress-container { background: rgba(0, 0, 0, 0.08); border-radius: 999px; }
        .progress-fill { background: linear-gradient(90deg, #0ea5e9, #0284c7); border-radius: 999px; }
        
        .channel-item { transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); border-left: 3px solid transparent; }
        .channel-item:hover { background: rgba(14, 165, 233, 0.08); transform: translateX(4px); }
        .channel-item.active { background: rgba(14, 165, 233, 0.12); border-left-color: #0ea5e9; }
        
        @keyframes slow-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        .pulse-indicator::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: #0ea5e9;
            animation: slow-pulse 4s ease-out infinite;
        }
        
        .text-primary { color: #0f172a; }
        .text-secondary { color: #475569; }
        .text-muted { color: #64748b; }
        .text-accent { color: #0284c7; }
        
        .icon-cctv { background: linear-gradient(135deg, #3b82f6, #06b6d4); }
        .icon-phoenix { background: linear-gradient(135deg, #f472b6, #db2777); }
        .icon-rthk { background: linear-gradient(135deg, #10b981, #059669); }
        .icon-default { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    </style>
</head>
<body class="bg-aurora text-primary">
    <div class="min-h-screen flex items-center justify-center p-10">
        <div class="w-full max-w-md space-y-8">
            <!-- Player -->
            <div class="liquid-glass rounded-[2.5rem] p-10">
                <div class="flex items-center justify-between mb-10">
                    <span class="font-semibold text-sm text-muted tracking-wide">FM Radio</span>
                </div>
                
                <div class="relative mb-10 mx-auto w-56 h-56">
                    <div id="albumArt" class="w-full h-full rounded-2xl bg-gradient-to-br from-sky-400 via-blue-400 to-cyan-300 flex items-center justify-center shadow-xl">
                        <svg class="w-28 h-28 text-white/60" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                    </div>
                    <div id="liveIndicator" class="absolute top-4 right-4 flex items-center gap-2 bg-white/80 backdrop-blur-sm rounded-full px-3 py-1.5 shadow-sm">
                        <div class="relative w-2 h-2 pulse-indicator"><div class="w-2 h-2 bg-sky-500 rounded-full relative z-10"></div></div>
                        <span class="text-[10px] font-medium text-accent">LIVE</span>
                    </div>
                </div>
                
                <div class="text-center mb-10">
                    <h1 id="channelName" class="font-semibold text-2xl text-primary mb-2">选择电台</h1>
                    <p id="channelStatus" class="text-sm text-muted">点击播放开始收听</p>
                </div>
                
                <div class="flex items-center justify-center gap-8 mb-8">
                    <button onclick="prevChannel()" class="control-btn w-14 h-14 rounded-full flex items-center justify-center text-secondary">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    <button id="playBtn" onclick="togglePlay()" class="play-btn w-20 h-20 rounded-full flex items-center justify-center text-white">
                        <svg id="playIcon" class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="pauseIcon" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <button onclick="nextChannel()" class="control-btn w-14 h-14 rounded-full flex items-center justify-center text-secondary">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>
                </div>
            </div>
            
            <!-- Channel List -->
            <div class="liquid-glass-dark rounded-[2rem] p-8 max-h-80 overflow-y-auto">
                <h2 class="font-semibold text-sm text-muted mb-6">Channel List</h2>
                <div id="channelList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        let channels = [];
        let currentIndex = -1;
        let isPlaying = false;
        let audio = new Audio();
        
        function getChannelIconClass(name) {
            if (name.includes('CCTV')) return 'icon-cctv';
            if (name.includes('凤凰')) return 'icon-phoenix';
            if (name.includes('RTHK') || name.includes('香港')) return 'icon-rthk';
            return 'icon-default';
        }
        
        fetch('/stations')
            .then(r => r.json())
            .then(data => {
                channels = data.channels || [];
                renderChannelList();
            })
            .catch(() => {
                channels = [
                    {name: 'CCTV-1', url: 'https://cd-live-stream.news.cctvplus.com/live/smil:CHANNEL1.smil/playlist.m3u8'},
                    {name: '凤凰中文', url: 'https://pluton.liveradio.cn/1001'},
                    {name: '凤凰资讯', url: 'https://pluton.liveradio.cn/1002'},
                    {name: 'RTHK TV 31', url: 'https://rthklive1-lh.akamaihd.net/i/rthk31_1@167495/index_2052_av-p.m3u8'},
                    {name: 'RTHK TV 32', url: 'https://rthklive2-lh.akamaihd.net/i/rthk32_1@168450/index_2052_av-p.m3u8'}
                ];
                renderChannelList();
            });
        
        function renderChannelList() {
            document.getElementById('channelList').innerHTML = channels.map((ch, i) => `
                <div class="channel-item flex items-center justify-between p-5 rounded-xl cursor-pointer ${i === currentIndex ? 'active' : ''}" onclick="playChannel(${i})">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg ${getChannelIconClass(ch.name)} flex items-center justify-center shadow-md">
                            <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                        </div>
                        <div>
                            <div class="font-semibold text-sm text-primary">${ch.name}</div>
                            <div class="text-xs ${i === currentIndex && isPlaying ? 'text-accent font-medium' : 'text-muted'}">${i === currentIndex && isPlaying ? '正在播放' : '点击收听'}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function playChannel(index) {
            currentIndex = index;
            const ch = channels[index];
            document.getElementById('channelName').textContent = ch.name;
            document.getElementById('channelStatus').textContent = '正在连接...';
            audio.src = ch.url;
            audio.play().then(() => {
                isPlaying = true;
                updatePlayButton();
                document.getElementById('channelStatus').textContent = '正在播放';
            }).catch(() => {
                document.getElementById('channelStatus').textContent = '连接失败';
            });
            renderChannelList();
        }
        
        function togglePlay() {
            if (currentIndex === -1 && channels.length > 0) {
                playChannel(0);
                return;
            }
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                document.getElementById('channelStatus').textContent = '已暂停';
            } else if (currentIndex !== -1) {
                audio.play();
                isPlaying = true;
                document.getElementById('channelStatus').textContent = '正在播放';
            }
            updatePlayButton();
            renderChannelList();
        }
        
        function updatePlayButton() {
            document.getElementById('playIcon').classList.toggle('hidden', isPlaying);
            document.getElementById('pauseIcon').classList.toggle('hidden', !isPlaying);
        }
        
        function prevChannel() {
            if (currentIndex > 0) playChannel(currentIndex - 1);
        }
        
        function nextChannel() {
            if (currentIndex < channels.length - 1) playChannel(currentIndex + 1);
        }
        
        audio.volume = 0.7;
    </script>
</body>
</html>
