<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Radio - Network Television</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        /* Liquid Glass - Light Frosted */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        
        .liquid-glass-dark {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }
        
        /* Gradient Background - Blue/White */
        .bg-aurora {
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(14, 165, 233, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(96, 165, 250, 0.15) 0%, transparent 60%),
                linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 30%, #eff6ff 70%, #f8fafc 100%);
            min-height: 100vh;
        }
        
        /* Play Button - Clean No Glow, Physical Feel */
        .play-btn {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 50%, #075985 100%);
            box-shadow: 
                inset 0 2px 4px rgba(255, 255, 255, 0.3),
                inset 0 -2px 4px rgba(0, 0, 0, 0.2),
                0 4px 12px rgba(2, 132, 199, 0.15);
            transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .play-btn:hover {
            transform: translateY(-1px);
            box-shadow: 
                inset 0 2px 4px rgba(255, 255, 255, 0.4),
                inset 0 -2px 4px rgba(0, 0, 0, 0.15),
                0 6px 16px rgba(2, 132, 199, 0.2);
        }
        
        .play-btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 
                inset 0 3px 6px rgba(0, 0, 0, 0.25),
                inset 0 -1px 2px rgba(255, 255, 255, 0.2);
        }
        
        /* Control Buttons */
        .control-btn {
            background: rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }
        
        .control-btn:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: scale(1.05);
        }
        
        /* Progress Bar */
        .progress-container {
            background: rgba(0, 0, 0, 0.08);
            border-radius: 999px;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #0ea5e9, #0284c7);
            border-radius: 999px;
        }
        
        /* Channel Item */
        .channel-item {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border-left: 3px solid transparent;
        }
        
        .channel-item:hover {
            background: rgba(14, 165, 233, 0.08);
            transform: translateX(4px);
        }
        
        .channel-item.active {
            background: rgba(14, 165, 233, 0.12);
            border-left-color: #0ea5e9;
        }
        
        .channel-item.error {
            opacity: 0.5;
            border-left-color: #ef4444;
        }
        
        /* Cover Art */
        .cover-glow {
            box-shadow: 
                0 20px 40px rgba(14, 165, 233, 0.2),
                0 8px 16px rgba(0, 0, 0, 0.1);
        }
        
        /* Slow Pulse Animation - 4s cycle */
        @keyframes slow-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        .pulse-indicator::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: #0ea5e9;
            animation: slow-pulse 4s ease-out infinite;
        }
        
        /* Modal Styles */
        .modal-overlay {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        .modal-content {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        /* Typography */
        .font-display {
            font-family: 'Geist', sans-serif;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        
        .font-body {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }
        
        /* Text Colors */
        .text-primary { color: #0f172a; }
        .text-secondary { color: #475569; }
        .text-muted { color: #64748b; }
        .text-accent { color: #0284c7; }
        
        /* Channel Icon Colors */
        .icon-cctv { background: linear-gradient(135deg, #3b82f6, #06b6d4); }
        .icon-phoenix { background: linear-gradient(135deg, #f472b6, #db2777); }
        .icon-rthk { background: linear-gradient(135deg, #10b981, #059669); }
        .icon-default { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    </style>
</head>
<body class="bg-aurora text-primary">
    <div class="min-h-screen flex items-center justify-center p-10">
        <div class="w-full max-w-md space-y-8">
            <!-- Main Player Card -->
            <div class="liquid-glass rounded-[2.5rem] p-10 relative overflow-hidden">
                <!-- Header -->
                <div class="flex items-center justify-between mb-10">
                    <span class="font-display text-sm text-muted tracking-wide">Network Radio</span>
                    <div class="flex gap-2">
                        <button onclick="openPlaylistModal()" class="w-10 h-10 rounded-full bg-black/5 hover:bg-black/10 flex items-center justify-center transition-colors" title="播放列表">
                            <svg class="w-5 h-5 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 010 3.75H5.625a1.875 1.875 0 010-3.75z"/>
                            </svg>
                        </button>
                        <a href="/admin" class="w-10 h-10 rounded-full bg-black/5 hover:bg-black/10 flex items-center justify-center transition-colors" title="管理后台">
                            <svg class="w-5 h-5 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10.343 3.94c.09-.542.56-.94 1.11-.94h1.093c.55 0 1.02.398 1.11.94l.149.894c.07.424.384.764.78.93.398.164.855.142 1.205-.108l.737-.527a1.125 1.125 0 011.45.12l.773.774c.39.389.44 1.002.12 1.45l-.527.737c-.25.35-.272.806-.107 1.204.165.397.505.71.93.78l.893.15c.543.09.94.56.94 1.109v1.094c0 .55-.397 1.02-.94 1.11l-.893.149c-.425.07-.765.383-.93.78-.165.398-.143.854.107 1.204l.527.738c.32.447.269 1.06-.12 1.45l-.774.773a1.125 1.125 0 01-1.449.12l-.738-.527c-.35-.25-.806-.272-1.203-.107-.397.165-.71.505-.781.929l-.149.894c-.09.542-.56.94-1.11.94h-1.094c-.55 0-1.019-.398-1.11-.94l-.148-.894c-.071-.424-.384-.764-.781-.93-.398-.164-.854-.142-1.204.108l-.738.527c-.447.32-1.06.269-1.45-.12l-.773-.774a1.125 1.125 0 01-.12-1.45l.527-.737c.25-.35.273-.806.108-1.204-.165-.397-.505-.71-.93-.78l-.894-.15c-.542-.09-.94-.56-.94-1.109v-1.094c0-.55.398-1.02.94-1.11l.894-.149c.424-.07.765-.383.93-.78.165-.398.143-.854-.107-1.204l-.527-.738a1.125 1.125 0 01.12-1.45l.773-.773a1.125 1.125 0 011.45-.12l.737.527c.35.25.807.272 1.204.107.397-.165.71-.505.78-.929l.15-.894z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                        </a>
                    </div>
                </div>
                
                <!-- Album Art -->
                <div class="relative mb-10 mx-auto w-56 h-56">
                    <div id="albumArt" class="w-full h-full rounded-2xl bg-gradient-to-br from-sky-400 via-blue-400 to-cyan-300 cover-glow flex items-center justify-center relative overflow-hidden">
                        <svg class="w-28 h-28 text-white/60" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                        </svg>
                        <div class="absolute inset-0 bg-[radial-gradient(circle_at_30%_30%,rgba(255,255,255,0.4)_0%,transparent_50%)]"></div>
                    </div>
                    <!-- Live Indicator - Slow Pulse -->
                    <div id="liveIndicator" class="absolute top-4 right-4 flex items-center gap-2 bg-white/80 backdrop-blur-sm rounded-full px-3 py-1.5 shadow-sm">
                        <div class="relative w-2 h-2 pulse-indicator">
                            <div class="w-2 h-2 bg-sky-500 rounded-full relative z-10"></div>
                        </div>
                        <span class="text-[10px] font-medium text-accent tracking-wider">LIVE</span>
                    </div>
                    <div id="pausedIndicator" class="absolute top-4 right-4 flex items-center gap-2 bg-white/80 backdrop-blur-sm rounded-full px-3 py-1.5 shadow-sm hidden">
                        <div class="w-2 h-2 bg-gray-400 rounded-full"></div>
                        <span class="text-[10px] font-medium text-muted tracking-wider">PAUSED</span>
                    </div>
                </div>
                
                <!-- Track Info -->
                <div class="text-center mb-10">
                    <h1 id="channelName" class="font-display text-2xl text-primary mb-2">选择电台</h1>
                    <p id="channelStatus" class="font-body text-sm text-muted">点击播放开始收听</p>
                </div>
                
                <!-- Progress Bar -->
                <div class="mb-10">
                    <div class="progress-container h-1.5 mb-4">
                        <div id="progressBar" class="progress-fill h-full relative" style="width: 0%">
                            <div class="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full shadow-md border border-sky-200"></div>
                        </div>
                    </div>
                    <div class="flex justify-between text-[10px] text-muted font-body">
                        <span id="currentTime">00:00</span>
                        <span>LIVE STREAM</span>
                    </div>
                </div>
                
                <!-- Controls -->
                <div class="flex items-center justify-center gap-8 mb-8">
                    <!-- Previous -->
                    <button onclick="prevChannel()" class="control-btn w-14 h-14 rounded-full flex items-center justify-center text-secondary">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                        </svg>
                    </button>
                    
                    <!-- Play/Pause -->
                    <button id="playBtn" onclick="togglePlay()" class="play-btn w-20 h-20 rounded-full flex items-center justify-center text-white">
                        <svg id="playIcon" class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg id="pauseIcon" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>
                    
                    <!-- Next -->
                    <button onclick="nextChannel()" class="control-btn w-14 h-14 rounded-full flex items-center justify-center text-secondary">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                        </svg>
                    </button>
                </div>
                
                <!-- Volume -->
                <div class="flex items-center gap-5 px-4">
                    <svg class="w-5 h-5 text-muted" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                    </svg>
                    <div class="flex-1 progress-container h-1">
                        <div id="volumeBar" class="progress-fill h-full" style="width: 70%"></div>
                    </div>
                    <svg class="w-5 h-5 text-muted" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                    </svg>
                </div>
            </div>
            
            <!-- Channel List -->
            <div class="liquid-glass-dark rounded-[2rem] p-8 max-h-80 overflow-y-auto">
                <h2 class="font-display text-sm text-muted mb-6 tracking-wide">Channel List</h2>
                <div id="channelList" class="space-y-4">
                    <!-- Dynamic Channels -->
                </div>
            </div>
        </div>
    </div>

    <!-- Playlist Modal -->
    <div id="playlistModal" class="fixed inset-0 modal-overlay hidden z-50 flex items-center justify-center p-4">
        <div class="modal-content rounded-[2rem] w-full max-w-md max-h-[80vh] overflow-hidden">
            <div class="p-6 border-b border-black/5">
                <div class="flex items-center justify-between">
                    <h2 class="font-display text-lg text-primary">播放列表</h2>
                    <button onclick="closePlaylistModal()" class="w-10 h-10 rounded-full bg-black/5 hover:bg-black/10 flex items-center justify-center">
                        <svg class="w-5 h-5 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <p class="text-sm text-muted mt-1">共 <span id="modalChannelCount">0</span> 个频道</p>
            </div>
            <div id="modalChannelList" class="p-4 overflow-y-auto max-h-[60vh] space-y-2">
                <!-- Dynamic Channels -->
            </div>
        </div>
    </div>

    <script>
        let channels = [];
        let currentIndex = -1;
        let isPlaying = false;
        let audio = new Audio();
        let progressInterval;
        let failedChannels = new Set();
        
        // Channel icon styles
        function getChannelIconClass(name) {
            if (name.includes('CCTV')) return 'icon-cctv';
            if (name.includes('凤凰')) return 'icon-phoenix';
            if (name.includes('RTHK') || name.includes('香港')) return 'icon-rthk';
            return 'icon-default';
        }
        
        function getChannelGradient(name) {
            if (name.includes('CCTV')) return 'from-sky-400 via-blue-400 to-cyan-300';
            if (name.includes('凤凰')) return 'from-pink-400 via-rose-400 to-red-300';
            if (name.includes('RTHK') || name.includes('香港')) return 'from-emerald-400 via-teal-400 to-cyan-300';
            return 'from-indigo-400 via-violet-400 to-purple-300';
        }
        
        // Load channels from API
        async function loadChannels() {
            try {
                const response = await fetch('/api/channels');
                const data = await response.json();
                channels = data.channels || [];
                renderChannelList();
                updateModalList();
            } catch (error) {
                console.error('Failed to load channels:', error);
                // Fallback channels
                channels = [
                    {id: 1, name: 'CCTV-1', url: 'https://cd-live-stream.news.cctvplus.com/live/smil:CHANNEL1.smil/playlist.m3u8', group_name: 'CCTV'},
                    {id: 2, name: 'CCTV-2', url: 'https://cd-live-stream.news.cctvplus.com/live/smil:CHANNEL2.smil/playlist.m3u8', group_name: 'CCTV'},
                    {id: 3, name: '凤凰中文', url: 'https://pluton.liveradio.cn/1001', group_name: '凤凰'},
                    {id: 4, name: '凤凰资讯', url: 'https://pluton.liveradio.cn/1002', group_name: '凤凰'},
                    {id: 5, name: 'RTHK TV 31', url: 'https://rthklive1-lh.akamaihd.net/i/rthk31_1@167495/index_2052_av-p.m3u8', group_name: '香港'},
                    {id: 6, name: 'RTHK TV 32', url: 'https://rthklive2-lh.akamaihd.net/i/rthk32_1@168450/index_2052_av-p.m3u8', group_name: '香港'},
                    {id: 7, name: '广东卫视', url: 'https://cdn4.skygo.mn/live/disk1/Guangdong/HLSv3-FTA/Guangdong.m3u8', group_name: '广东'},
                    {id: 8, name: '北京卫视', url: 'https://cdn4.skygo.mn/live/disk1/Beijing/HLSv3-FTA/Beijing.m3u8', group_name: '北京'}
                ];
                renderChannelList();
                updateModalList();
            }
        }
        
        function renderChannelList() {
            const list = document.getElementById('channelList');
            if (!channels.length) {
                list.innerHTML = '<div class="text-center text-muted py-4">暂无频道</div>';
                return;
            }
            
            list.innerHTML = channels.map((ch, i) => `
                <div class="channel-item flex items-center justify-between p-5 rounded-xl cursor-pointer ${i === currentIndex ? 'active' : ''} ${failedChannels.has(ch.id) ? 'error' : ''}" onclick="playChannel(${i})">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg ${getChannelIconClass(ch.name)} flex items-center justify-center shadow-md">
                            <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="font-display text-sm text-primary">${ch.name}</div>
                            <div class="text-xs ${i === currentIndex && isPlaying ? 'text-accent font-medium' : 'text-muted'}">
                                ${failedChannels.has(ch.id) ? '连接失败' : (i === currentIndex && isPlaying ? '正在播放' : '点击收听')}
                            </div>
                        </div>
                    </div>
                    ${i === currentIndex && isPlaying ? 
                        '<svg class="w-5 h-5 text-accent" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>' :
                        '<svg class="w-5 h-5 text-muted" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'
                    }
                </div>
            `).join('');
        }
        
        function updateModalList() {
            const modalList = document.getElementById('modalChannelList');
            const count = document.getElementById('modalChannelCount');
            count.textContent = channels.length;
            
            if (!channels.length) {
                modalList.innerHTML = '<div class="text-center text-muted py-4">暂无频道</div>';
                return;
            }
            
            modalList.innerHTML = channels.map((ch, i) => `
                <div class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-sky-50 transition-colors ${i === currentIndex ? 'bg-sky-100' : ''}" onclick="playChannelFromModal(${i})">
                    <div class="w-8 h-8 rounded-lg ${getChannelIconClass(ch.name)} flex items-center justify-center">
                        <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                        </svg>
                    </div>
                    <div class="flex-1">
                        <div class="font-display text-sm text-primary">${ch.name}</div>
                        <div class="text-xs text-muted">${ch.group_name || 'General'}</div>
                    </div>
                    ${i === currentIndex && isPlaying ? 
                        '<span class="text-xs text-accent font-medium">播放中</span>' : ''
                    }
                </div>
            `).join('');
        }
        
        function playChannel(index) {
            if (index < 0 || index >= channels.length) return;
            
            currentIndex = index;
            const ch = channels[index];
            
            document.getElementById('channelName').textContent = ch.name;
            document.getElementById('channelStatus').textContent = '正在连接...';
            
            // Update album art color
            const art = document.getElementById('albumArt');
            art.className = `w-full h-full rounded-2xl cover-glow flex items-center justify-center relative overflow-hidden bg-gradient-to-br ${getChannelGradient(ch.name)}`;
            
            // Clear previous error state
            failedChannels.delete(ch.id);
            
            audio.src = ch.url;
            audio.play().then(() => {
                isPlaying = true;
                updatePlayButton();
                document.getElementById('channelStatus').textContent = '正在播放';
                document.getElementById('liveIndicator').classList.remove('hidden');
                document.getElementById('pausedIndicator').classList.add('hidden');
                startProgress();
                renderChannelList();
                updateModalList();
            }).catch(e => {
                console.error('Play error:', e);
                document.getElementById('channelStatus').textContent = '连接失败，自动切换...';
                document.getElementById('liveIndicator').classList.add('hidden');
                failedChannels.add(ch.id);
                renderChannelList();
                
                // Auto skip to next after 2 seconds
                setTimeout(() => {
                    if (currentIndex === index) {
                        nextChannel();
                    }
                }, 2000);
            });
        }
        
        function playChannelFromModal(index) {
            playChannel(index);
            closePlaylistModal();
        }
        
        function togglePlay() {
            if (currentIndex === -1 && channels.length > 0) {
                playChannel(0);
                return;
            }
            
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                document.getElementById('channelStatus').textContent = '已暂停';
                document.getElementById('liveIndicator').classList.add('hidden');
                document.getElementById('pausedIndicator').classList.remove('hidden');
                stopProgress();
            } else if (currentIndex !== -1) {
                audio.play().then(() => {
                    isPlaying = true;
                    document.getElementById('channelStatus').textContent = '正在播放';
                    document.getElementById('liveIndicator').classList.remove('hidden');
                    document.getElementById('pausedIndicator').classList.add('hidden');
                    startProgress();
                    renderChannelList();
                    updateModalList();
                }).catch(() => {
                    // If resume fails, try next channel
                    nextChannel();
                });
            }
            updatePlayButton();
        }
        
        function updatePlayButton() {
            document.getElementById('playIcon').classList.toggle('hidden', isPlaying);
            document.getElementById('pauseIcon').classList.toggle('hidden', !isPlaying);
        }
        
        // FIXED: Loop navigation
        function prevChannel() {
            if (channels.length === 0) return;
            const index = currentIndex <= 0 ? channels.length - 1 : currentIndex - 1;
            playChannel(index);
        }
        
        function nextChannel() {
            if (channels.length === 0) return;
            // Skip failed channels
            let attempts = 0;
            let index = currentIndex;
            do {
                index = index >= channels.length - 1 ? 0 : index + 1;
                attempts++;
            } while (failedChannels.has(channels[index]?.id) && attempts < channels.length);
            
            if (attempts < channels.length) {
                playChannel(index);
            }
        }
        
        function startProgress() {
            let width = 0;
            progressInterval = setInterval(() => {
                width += 0.5;
                if (width > 100) width = 0;
                document.getElementById('progressBar').style.width = width + '%';
                
                const seconds = Math.floor(width * 60 / 100);
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                document.getElementById('currentTime').textContent = 
                    String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            }, 300);
        }
        
        function stopProgress() {
            clearInterval(progressInterval);
        }
        
        // Modal functions
        function openPlaylistModal() {
            document.getElementById('playlistModal').classList.remove('hidden');
            updateModalList();
        }
        
        function closePlaylistModal() {
            document.getElementById('playlistModal').classList.add('hidden');
        }
        
        // Close modal on outside click
        document.getElementById('playlistModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closePlaylistModal();
            }
        });
        
        // Volume control
        audio.volume = 0.7;
        
        // Audio event handlers
        audio.addEventListener('ended', () => {
            isPlaying = false;
            updatePlayButton();
            document.getElementById('channelStatus').textContent = '播放结束';
            document.getElementById('liveIndicator').classList.add('hidden');
            stopProgress();
        });
        
        audio.addEventListener('error', () => {
            if (currentIndex !== -1) {
                const ch = channels[currentIndex];
                failedChannels.add(ch?.id);
                document.getElementById('channelStatus').textContent = '连接错误，自动切换...';
                document.getElementById('liveIndicator').classList.add('hidden');
                renderChannelList();
                
                // Auto skip
                setTimeout(() => {
                    nextChannel();
                }, 1500);
            }
        });
        
        // Initialize
        loadChannels();
    </script>
</body>
</html>
